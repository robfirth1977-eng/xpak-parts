<!-- ═══════════════════════════════════════════════════════════
     X-PAK AUTH — paste this entire block just before </body>
════════════════════════════════════════════════════════════ -->

<div id="xpak-auth-overlay" style="position:fixed;inset:0;background:#0f1923;z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#141f2d;border:1px solid #1e3048;border-radius:12px;padding:40px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.6)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:20px;font-weight:700;color:#fff;letter-spacing:2px">X-PAK</div>
      <div style="font-size:11px;color:#00c8e0;letter-spacing:3px;margin-top:4px">SERVICE</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:11px;color:#64b5c8;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Email</label>
      <input id="xpak-email" type="email" placeholder="your@email.com"
        onkeydown="if(event.key==='Enter')document.getElementById('xpak-pw').focus()"
        style="width:100%;padding:10px 12px;background:#0f1923;border:1px solid #2a4060;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-size:11px;color:#64b5c8;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Password</label>
      <input id="xpak-pw" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')xpakLogin()"
        style="width:100%;padding:10px 12px;background:#0f1923;border:1px solid #2a4060;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;box-sizing:border-box">
    </div>
    <button id="xpak-login-btn" onclick="xpakLogin()"
      style="width:100%;padding:12px;background:#00c8e0;border:none;border-radius:6px;color:#0f1923;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px">
      SIGN IN
    </button>
    <div id="xpak-err" style="display:none;margin-top:12px;padding:10px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:6px;color:#f87171;font-size:12px;text-align:center"></div>
  </div>
</div>

<script>
(function() {
  var AUTH  = 'https://stsjbqaqisxcqoklwdzb.supabase.co/auth/v1';
  var AKEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0c2picWFxaXN4Y3Fva2x3ZHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njk0MzAsImV4cCI6MjA5MTI0NTQzMH0.B5dR-TnRn_awF3opKSroqVJk46Okypr2wE-ZoNsSn5Q';
  var SKEY  = 'xpak_s';

  function hide() {
    var o = document.getElementById('xpak-auth-overlay');
    if (o) o.style.display = 'none';
    // Add sign out button to header
    if (!document.getElementById('xpak-so')) {
      var b = document.createElement('button');
      b.id = 'xpak-so';
      b.textContent = 'SIGN OUT';
      b.onclick = function() {
        localStorage.removeItem(SKEY);
        document.getElementById('xpak-auth-overlay').style.display = 'flex';
        document.getElementById('xpak-email').value = '';
        document.getElementById('xpak-pw').value = '';
        document.getElementById('xpak-err').style.display = 'none';
        b.remove();
      };
      b.style.cssText = 'padding:5px 13px;background:transparent;border:1px solid #2a4060;border-radius:6px;color:#64b5c8;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-left:8px';
      var hdr = document.querySelector('.header');
      if (hdr) hdr.appendChild(b);
    }
  }

  // Check existing session
  try {
    var s = JSON.parse(localStorage.getItem(SKEY) || 'null');
    if (s && s.exp && Date.now() / 1000 < s.exp) { hide(); }
  } catch(e) {}

  window.xpakLogin = async function() {
    var email = document.getElementById('xpak-email').value.trim();
    var pw    = document.getElementById('xpak-pw').value;
    var btn   = document.getElementById('xpak-login-btn');
    var err   = document.getElementById('xpak-err');
    err.style.display = 'none';
    if (!email || !pw) { err.textContent = 'Enter your email and password.'; err.style.display = 'block'; return; }
    btn.textContent = 'SIGNING IN...'; btn.disabled = true;
    try {
      var r = await fetch(AUTH + '/token?grant_type=password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': AKEY },
        body: JSON.stringify({ email: email, password: pw })
      });
      var d = await r.json();
      if (!r.ok || d.error) throw new Error(d.error_description || d.msg || 'Invalid email or password');
      localStorage.setItem(SKEY, JSON.stringify({ exp: d.expires_at, u: d.user ? d.user.email : email }));
      hide();
    } catch(e) {
      err.textContent = e.message || 'Sign in failed.';
      err.style.display = 'block';
    }
    btn.textContent = 'SIGN IN'; btn.disabled = false;
  };
})();
</script>
